<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>full-stack example</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #fbfbfd; color: #1d1d1f;
         display: grid; place-items: center; min-height: 100vh; margin: 0; }
  .card { text-align: center; max-width: 520px; padding: 0 20px; }
  h1 { font-size: 36px; margin: 0 0 10px; }
  p { color: #6e6e73; line-height: 1.6; }
  a { color: #0071e3; text-decoration: none; }
  code { background: #f5f5f7; padding: 2px 7px; border-radius: 6px; }
</style>
</head>
<body>
  <div class="card">
    <h1>📦 full-stack</h1>
    <p>You&rsquo;re looking at the static <strong>web</strong> service, served through the
       <strong>Caddy</strong> proxy.</p>
    <p>The API lives at <a href="/api/"><code>/api/</code></a> (the whoami service),
       and a private Redis <strong>cache</strong> sits on an isolated backend network.</p>
  </div>
</body>
</html>
