name: Docs

# Publishes the static site in docs/ to GitHub Pages
# (https://flaticols.github.io/container-compose/).

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Required for the GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs/ to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/configure-pages@v5
        with:
          # Turn Pages on automatically if it isn't already (no settings click).
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
