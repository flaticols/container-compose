# configs/secrets provisioning: short + long refs, content: and file: sources.
# content: sources need no backing file (safe for docker compose config);
# the one file: source has a committed backing file under secrets/.
name: confsec
services:
  app:
    image: app:latest
    secrets:
      - db_password # short -> /run/secrets/db_password
      - source: api_key # long -> custom target
        target: /etc/api/key
        mode: 0440
    configs:
      - source: app_config # long -> custom target
        target: /etc/app/config.yaml
      - nginx_conf # short -> /nginx_conf

secrets:
  db_password:
    environment: DB_PASSWORD # materialized from the env var
  api_key:
    file: ./secrets/api_key.txt

configs:
  app_config:
    content: |
      log_level: debug
      workers: 4
  nginx_conf:
    content: "worker_processes 1;"
