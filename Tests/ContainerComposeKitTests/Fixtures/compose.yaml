name: demo
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: secret
      POSTGRES_USER: app
    volumes:
      - dbdata:/var/lib/postgresql/data
    networks:
      - backend

  cache:
    image: redis:7
    networks:
      - backend

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - BUILD_ENV=prod
    command: ["node", "server.js"]
    ports:
      - "8080:80"
      - "127.0.0.1:9090:9090/tcp"
    environment:
      - DATABASE_URL=postgres://app@db:5432/app
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    volumes:
      - ./web/static:/app/static:ro
    networks:
      - backend
      - frontend
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m

networks:
  backend:
  frontend:
    ipam:
      config:
        - subnet: 10.5.0.0/24

volumes:
  dbdata:
