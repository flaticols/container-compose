name: Release

# Builds a .pkg installer for the `container compose` plugin.
#
#   * Always builds the .pkg. If the Developer ID secrets are ABSENT it is
#     UNSIGNED (installable, but Gatekeeper warns / needs an override).
#   * If the signing secrets are PRESENT the binary is codesigned (hardened
#     runtime), the .pkg is productsigned, notarized and stapled — no workflow
#     change needed, it upgrades automatically once you add the secrets.
#   * The GitHub Release is created as a DRAFT, the .pkg is attached while the
#     draft is still mutable, then it is published. This is compatible with the
#     repo's immutable-releases ruleset (a published release can't be edited, so
#     assets must be attached before publishing).
#   * Trigger by pushing a version tag (v1.2.3), OR by running this workflow
#     manually with a `version` input (which creates the tag + release without a
#     tag push). A manual run with no version just uploads the .pkg as an artifact.
#
# See PACKAGING.md for the secrets and the signed/unsigned matrix.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.6). Empty = build artifact only, no release."
        required: false

permissions:
  contents: write   # create/upload the GitHub Release on tag builds

jobs:
  package:
    runs-on: macos-26
    # Safety net: a misconfigured signing step that blocks on a keychain prompt
    # would otherwise hang until the 6h default — cap it well below that.
    timeout-minutes: 30
    # macos-26 is arm64 (Apple Silicon). Apple's `container` is Apple-Silicon-only,
    # so the plugin binary must be built on arm64.
    env:
      # Identity name prefixes — codesign/productsign match these against the
      # certs imported into the temporary keychain.
      APP_IDENTITY: "Developer ID Application"
      INSTALLER_IDENTITY: "Developer ID Installer"
      PKG_IDENTIFIER: "dev.flaticols.container-compose"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Resolve version & mode
        id: meta
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="$GITHUB_REF_NAME"; VERSION="${TAG#v}"; RELEASE=true
          else
            VERSION="${{ github.event.inputs.version }}"
            if [ -n "$VERSION" ]; then
              TAG="v$VERSION"; RELEASE=true   # manual run with a version: create tag + release
            else
              VERSION="0.0.0-${GITHUB_SHA::7}"; TAG=""; RELEASE=false
            fi
          fi
          PKG="dist/container-compose-${VERSION}.pkg"
          {
            echo "tag=$TAG"
            echo "version=$VERSION"
            echo "release=$RELEASE"
            echo "pkg=$PKG"
          } >> "$GITHUB_OUTPUT"
          echo "Building $PKG (release=$RELEASE)"

      - name: Detect signing capability
        id: signing
        env:
          APP_CERT_P12_BASE64: ${{ secrets.MACOS_APP_CERT_P12_BASE64 }}
        run: |
          if [ -n "${APP_CERT_P12_BASE64:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing secrets present — producing a SIGNED, notarized .pkg."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Signing secrets absent — producing an UNSIGNED .pkg."
          fi

      - name: Stamp version from the tag
        run: |
          set -euo pipefail
          printf 'let containerComposeVersion = "%s"\n' "${{ steps.meta.outputs.version }}" \
            > Sources/container-compose/Version.swift
          cat Sources/container-compose/Version.swift

      - name: Build release binary
        run: swift build -c release

      - name: Verify binary reports the tag version
        run: |
          set -euo pipefail
          got="$("$(swift build -c release --show-bin-path)/container-compose" --version)"
          want="${{ steps.meta.outputs.version }}"
          echo "binary --version: $got (want: $want)"
          [ "$got" = "$want" ] || { echo "::error::version mismatch: $got != $want"; exit 1; }

      - name: Import signing certificates
        if: steps.signing.outputs.enabled == 'true'
        env:
          APP_CERT_P12_BASE64: ${{ secrets.MACOS_APP_CERT_P12_BASE64 }}
          APP_CERT_P12_PASSWORD: ${{ secrets.MACOS_APP_CERT_P12_PASSWORD }}
          INSTALLER_CERT_P12_BASE64: ${{ secrets.MACOS_INSTALLER_CERT_P12_BASE64 }}
          INSTALLER_CERT_P12_PASSWORD: ${{ secrets.MACOS_INSTALLER_CERT_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/build.keychain-db"
          echo "$APP_CERT_P12_BASE64"       | base64 --decode > "$RUNNER_TEMP/app.p12"
          echo "$INSTALLER_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/installer.p12"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          # productsign resolves the signing identity against the DEFAULT keychain,
          # not just the search list that codesign honors. Without this, productsign
          # can't reach the Installer key non-interactively and hangs forever on a
          # GUI auth prompt the headless runner never answers. Make the temp
          # keychain the default so both tools sign without prompting.
          security default-keychain -s "$KEYCHAIN"

          # Import with -A (allow ANY tool to use the key without prompting). The
          # narrower `-T /usr/bin/<tool>` ACL was enough for codesign but
          # productsign still blocked on an auth prompt — its access to the
          # Installer key isn't covered the same way — so it hung forever on the
          # headless runner. -A plus the partition list below makes both sign
          # non-interactively.
          security import "$RUNNER_TEMP/app.p12"       -k "$KEYCHAIN" -P "$APP_CERT_P12_PASSWORD"       -A
          security import "$RUNNER_TEMP/installer.p12" -k "$KEYCHAIN" -P "$INSTALLER_CERT_P12_PASSWORD" -A

          # Grant non-interactive access to the imported keys (the partition list
          # is the real gate on modern macOS; -A alone is not enough).
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" login.keychain-db
          rm -f "$RUNNER_TEMP/app.p12" "$RUNNER_TEMP/installer.p12"

          # Diagnostics: prove both signing identities landed with distinct keys.
          # Expect exactly 2 valid identities (Developer ID Application + Installer).
          echo "=== identities in build keychain ==="
          security find-identity -v "$KEYCHAIN"

      - name: Codesign binary (hardened runtime)
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          BIN="$(swift build -c release --show-bin-path)/container-compose"
          codesign --force --timestamp --options runtime --sign "$APP_IDENTITY" "$BIN"
          codesign --verify --strict --verbose=2 "$BIN"

      - name: Build component payload
        run: |
          set -euo pipefail
          BIN="$(swift build -c release --show-bin-path)/container-compose"
          PLUGIN="dist/payload/usr/local/libexec/container-plugins/compose"
          mkdir -p "$PLUGIN/bin"
          # The binary MUST be named `compose` so `container compose ...` resolves to it.
          install -m 0755 "$BIN" "$PLUGIN/bin/compose"
          install -m 0644 config.toml "$PLUGIN/config.toml"

      - name: Build .pkg (pkgbuild)
        run: |
          set -euo pipefail
          mkdir -p dist
          pkgbuild \
            --root dist/payload \
            --identifier "$PKG_IDENTIFIER" \
            --version "${{ steps.meta.outputs.version }}" \
            --install-location / \
            dist/component.pkg

      - name: Sign .pkg (productsign)
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -uo pipefail
          PKG="${{ steps.meta.outputs.pkg }}"
          # productsign blocks forever on securityd if it can't reach the Installer
          # key non-interactively. Run it in the background and, if it's still alive
          # after 60s, capture a stack sample (network vs keychain) and fail fast
          # instead of hanging to the job timeout.
          productsign --sign "$INSTALLER_IDENTITY" dist/component.pkg "$PKG" &
          pid=$!
          for _ in $(seq 1 60); do kill -0 "$pid" 2>/dev/null || break; sleep 1; done
          if kill -0 "$pid" 2>/dev/null; then
            echo "::error::productsign still blocked after 60s — sampling then failing"
            sample "$pid" 3 2>&1 | sed -n '1,80p' || true
            kill -9 "$pid" 2>/dev/null || true
            exit 1
          fi
          wait "$pid"; rc=$?
          [ "$rc" -eq 0 ] || { echo "::error::productsign exited $rc"; exit "$rc"; }
          echo "productsign OK"

      - name: Finalize unsigned .pkg
        if: steps.signing.outputs.enabled != 'true'
        run: mv dist/component.pkg "${{ steps.meta.outputs.pkg }}"

      - name: Notarize and staple
        if: steps.signing.outputs.enabled == 'true'
        env:
          # App Store Connect API key. See PACKAGING.md for the Apple-ID alternative.
          NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
          NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
          NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          PKG="${{ steps.meta.outputs.pkg }}"
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/notary.p8"

          xcrun notarytool submit "$PKG" \
            --key "$RUNNER_TEMP/notary.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID" \
            --wait

          # Stapling embeds the ticket so Gatekeeper passes offline.
          xcrun stapler staple "$PKG"
          xcrun stapler validate "$PKG"
          rm -f "$RUNNER_TEMP/notary.p8"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: container-compose-pkg-${{ steps.meta.outputs.version }}
          path: ${{ steps.meta.outputs.pkg }}
          if-no-files-found: error

      # Create the release as a DRAFT and attach the .pkg while it is still
      # mutable. Immutable releases reject asset uploads once published, so the
      # asset must be present before the publish step below flips the draft off.
      # On a manual run (no tag pushed) softprops creates the tag at this commit.
      - name: Attach .pkg to a draft GitHub Release
        if: steps.meta.outputs.release == 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: ${{ steps.meta.outputs.pkg }}
          fail_on_unmatched_files: true
          draft: true
          # Tags with a prerelease suffix (v0.0.1-beta1) are marked pre-release.
          prerelease: ${{ contains(steps.meta.outputs.tag, '-') }}

      # Publish the draft (now carrying the .pkg). Under immutable releases this
      # is the moment the release locks — with its asset already attached.
      - name: Publish the release
        if: steps.meta.outputs.release == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ steps.meta.outputs.tag }}" --draft=false
